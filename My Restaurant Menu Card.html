<!DOCTYPE html>
<html>
    <head>
        <title>My Restaurant's Menu Card</title>
        <style>

            body {background-color: darkblue;
                color: white;
                font-family: Arial, sans-serif;}

            .restaurant-name {font-size: 60px;
                        font-weight: bold;
                        color: yellow;
                        text-shadow: 3px 3px orange}
            
            .tagline {font-style: italic;
                    color: lightblue;
                    text-transform: capitalize;}

            .label {text-transform: uppercase;
                    text-decoration: underline;
                    color: coral;}
            
            .dishes {font-weight: bold;
                    color: lightgreen;}

            .drinks {text-decoration: line-through;
                        color: gray;}

            .dessert {font-size: 20px;
                    font-weight: bold;
                    color: gold;
                    transform: rotate(0deg);}

            .made-by {color:coral;
                    font-style: italic;}

            .discount {font-size: 20px;
                    font-weight: bold;
                    color: rgb(30, 176, 166);
                    transform: rotate(5deg);}
        </style>
    </head>
    <body>

        <h1 class="restaurant-name">A2B</h1>
        <p class="tagline">"Connecting A2B."</p>

        <h2 class="label">Cuisine (indian)</h2>
        <p class="dishes">Dosa</p>
        <p class="dishes">Idly</p>
        <p class="dishes">Pongal</p>

        <h2 class="label">Cuisine (chinese)</h2>
        <p class="dishes">Dumplings</p>
        <p class="dishes">Sweet & Sour Pork (or chicken)</p>
        <p class="dishes">Chow Mein</p>

        <h2 class="label">Refreshments</h2>
        <p class="drinks">Mango Lassi</p>
        <p class="drinks">Rose Milk</p>
        <p class="drinks">Apple Juice</p>


        <h2 class="label">Desserts</h2>
        <p class="dessert">Hot Fudge Ice-cream</p>
        <p class="dessert">Hot Fudge Brownie</p>
         <p class="discount">20% off!!</p>

        <p class="made-by">Created by _____Gordon Ramsy_____</p>
    </body>
</html>
